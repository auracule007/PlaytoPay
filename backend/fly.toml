# fly.toml — PlaytoPay backend (Django + Gunicorn)
# Deploy from the backend/ directory: fly deploy
# First time: fly launch --no-deploy (from backend/ dir), then fly deploy

app = "playtopay-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DEBUG = "0"
  ALLOWED_HOSTS = "playtopay-backend.fly.dev"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
